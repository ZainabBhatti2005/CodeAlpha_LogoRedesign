<svg viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <defs>
    <linearGradient id="oldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A7FE0"/>
      <stop offset="100%" stop-color="#1F4FA6"/>
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9FBBD4"/>
      <stop offset="100%" stop-color="#7B98B3"/>
    </linearGradient>
    <linearGradient id="cloudGradB" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9B6E4"/>
      <stop offset="100%" stop-color="#7B98B3"/>
    </linearGradient>
    <radialGradient id="dotGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F6C98A"/>
      <stop offset="100%" stop-color="#F0B26B"/>
    </radialGradient>
  </defs>

  <rect width="1400" height="900" fill="#EDF1F7"/>

  <!-- Title -->
  <text x="60" y="55" font-size="14" letter-spacing="3" fill="#7B98B3" font-family="IBM Plex Mono, monospace">CODEALPHA · GRAPHIC DESIGN · TASK 01</text>
  <text x="60" y="95" font-size="34" fill="#2B3A55" font-family="Fraunces, serif" font-weight="600">Nimbus — Logo Redesign</text>

  <!-- BEFORE panel -->
  <g>
    <rect x="60" y="140" width="380" height="330" rx="18" fill="#FFFFFF" stroke="#D7DEE8" stroke-width="1.5"/>
    <text x="90" y="180" font-size="12" letter-spacing="2" fill="#9AA7B8" font-family="IBM Plex Mono, monospace">BEFORE</text>

    <!-- generic old logo: circle badge + swoosh, stock tech look -->
    <circle cx="250" cy="290" r="70" fill="url(#oldGrad)"/>
    <path d="M 200 300 Q 250 250 300 300 Q 250 320 200 300 Z" fill="#FFFFFF" opacity="0.85"/>
    <text x="250" y="410" font-size="26" font-weight="700" fill="#1F4FA6" text-anchor="middle" font-family="Inter, sans-serif">NIMBUS</text>
    <text x="90" y="450" font-size="12.5" fill="#7A8494" font-family="Inter, sans-serif">Generic gradient orb + swoosh.</text>
    <text x="90" y="468" font-size="12.5" fill="#7A8494" font-family="Inter, sans-serif">Interchangeable with any SaaS brand.</text>
  </g>

  <!-- Design logic note -->
  <g>
    <rect x="60" y="500" width="380" height="340" rx="18" fill="#2B3A55"/>
    <text x="90" y="540" font-size="12" letter-spacing="2" fill="#C9B6E4" font-family="IBM Plex Mono, monospace">DESIGN LOGIC</text>
    <text x="90" y="575" font-size="14" fill="#EDF1F7" font-family="Inter, sans-serif">1. Replace the stock gradient orb</text>
    <text x="90" y="598" font-size="14" fill="#EDF1F7" font-family="Inter, sans-serif">with an organic cloud form built</text>
    <text x="90" y="621" font-size="14" fill="#EDF1F7" font-family="Inter, sans-serif">from three overlapping circles —</text>
    <text x="90" y="644" font-size="14" fill="#EDF1F7" font-family="Inter, sans-serif">it reads as "nimbus" literally.</text>

    <text x="90" y="682" font-size="14" fill="#EDF1F7" font-family="Inter, sans-serif">2. Swap the bold sans wordmark for</text>
    <text x="90" y="705" font-size="14" fill="#EDF1F7" font-family="Inter, sans-serif">Fraunces, a warm serif — softens a</text>
    <text x="90" y="728" font-size="14" fill="#EDF1F7" font-family="Inter, sans-serif">"tech" brand into a "calm" one.</text>

    <text x="90" y="766" font-size="14" fill="#EDF1F7" font-family="Inter, sans-serif">3. One warm amber dot ties every</text>
    <text x="90" y="789" font-size="14" fill="#EDF1F7" font-family="Inter, sans-serif">variation together — it's the "sun</text>
    <text x="90" y="812" font-size="14" fill="#EDF1F7" font-family="Inter, sans-serif">behind the cloud," the brand's</text>
    <text x="90" y="835" font-size="14" fill="#EDF1F7" font-family="Inter, sans-serif">recurring signature mark.</text>
  </g>

  <!-- Variation A: mark-only monogram -->
  <g>
    <rect x="470" y="140" width="290" height="330" rx="18" fill="#FFFFFF" stroke="#D7DEE8" stroke-width="1.5"/>
    <text x="500" y="180" font-size="12" letter-spacing="2" fill="#9AA7B8" font-family="IBM Plex Mono, monospace">VARIATION A · MARK</text>
    <g transform="translate(615,300)">
      <circle cx="-30" cy="10" r="42" fill="url(#cloudGrad)"/>
      <circle cx="20" cy="-10" r="54" fill="url(#cloudGrad)"/>
      <circle cx="50" cy="20" r="34" fill="url(#cloudGrad)"/>
      <circle cx="45" cy="-8" r="9" fill="url(#dotGrad)"/>
    </g>
    <text x="500" y="440" font-size="12.5" fill="#7A8494" font-family="Inter, sans-serif">App icon / favicon / social avatar.</text>
    <text x="500" y="458" font-size="12.5" fill="#7A8494" font-family="Inter, sans-serif">Works at 24px.</text>
  </g>

  <!-- Variation B: combination mark -->
  <g>
    <rect x="790" y="140" width="550" height="330" rx="18" fill="#FFFFFF" stroke="#D7DEE8" stroke-width="1.5"/>
    <text x="820" y="180" font-size="12" letter-spacing="2" fill="#9AA7B8" font-family="IBM Plex Mono, monospace">VARIATION B · COMBINATION MARK</text>
    <g transform="translate(890,300)">
      <circle cx="-25" cy="8" r="34" fill="url(#cloudGradB)"/>
      <circle cx="16" cy="-8" r="44" fill="url(#cloudGradB)"/>
      <circle cx="42" cy="16" r="26" fill="url(#cloudGradB)"/>
      <circle cx="38" cy="-6" r="7" fill="url(#dotGrad)"/>
    </g>
    <text x="985" y="315" font-size="46" fill="#2B3A55" font-family="Fraunces, serif" font-weight="600">nimbus</text>
    <text x="820" y="440" font-size="12.5" fill="#7A8494" font-family="Inter, sans-serif">Primary lockup for headers, splash screens,</text>
    <text x="820" y="458" font-size="12.5" fill="#7A8494" font-family="Inter, sans-serif">and the App Store listing.</text>
  </g>

  <!-- Variation C: wordmark only -->
  <g>
    <rect x="470" y="500" width="870" height="340" rx="18" fill="#FFFFFF" stroke="#D7DEE8" stroke-width="1.5"/>
    <text x="500" y="540" font-size="12" letter-spacing="2" fill="#9AA7B8" font-family="IBM Plex Mono, monospace">VARIATION C · WORDMARK-ONLY</text>
    <text x="500" y="680" font-size="80" fill="#2B3A55" font-family="Fraunces, serif" font-weight="500" letter-spacing="1">nimbus<tspan fill="#F0B26B">.</tspan></text>
    <text x="500" y="720" font-size="14" fill="#7A8494" font-family="Inter, sans-serif" letter-spacing="4">B R E A T H E   E A S Y</text>
    <text x="500" y="790" font-size="12.5" fill="#7A8494" font-family="Inter, sans-serif">Minimal lockup for merch, letterhead, and</text>
    <text x="500" y="808" font-size="12.5" fill="#7A8494" font-family="Inter, sans-serif">contexts where the mark can't render at size.</text>
    <text x="500" y="826" font-size="12.5" fill="#7A8494" font-family="Inter, sans-serif">The amber period is the only spot color.</text>
  </g>
</svg>
